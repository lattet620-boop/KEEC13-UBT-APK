name: HTML to APK (SDK 21 - Final Stable)
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Prepare Folder and Install Tools
        run: |
          npm install -g @ionic/cli @capacitor/assets
          npm install @capacitor/core @capacitor/cli @capacitor/android
          mkdir -p assets www
          cp icon.png assets/icon.png || echo "icon.png not found"
          cp splash.png assets/splash.png || echo "splash.png not found"
          cp -r ./* www/ || true
          rm -rf www/.github www/assets www/www || true

      - name: Initialize and Build Android
        run: |
          rm -rf android
          npx cap init ubt5 com.ubt5.app --web-dir www
          npx cap add android
          npx capacitor-assets generate --android --assetPath assets

          # Network Security နှင့် Permission များ အပြည့်အစုံ ထည့်သွင်းခြင်း
          sed -i 's/android:usesCleartextTraffic="false"/android:usesCleartextTraffic="true"/' android/app/src/main/AndroidManifest.xml
          
          # Capacitor Config ပြင်ဆင်ခြင်း
          echo '{"appId": "com.ubt5.app", "appName": "ubt5", "webDir": "www", "server": {"allowNavigation": ["*"], "cleartext": true}}' > capacitor.config.json

          export JAVA_HOME=$JAVA_HOME_21_X64
          npx cap sync android
          
          # Android Version ပိုမြင့်စေရန် Gradle အား ခိုင်းစေခြင်း
          cd android && ./gradlew assembleRelease

      - name: Sign Android APK with Release Key
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          # ၁။ Keystore ကို ပြန်လည် ထုတ်ယူခြင်း
          echo "$KEYSTORE_BASE64" | base64 --decode > release.jks
          
          # ၂။ Build Tools လမ်းကြောင်းကို အလိုအလျောက် ရှာဖွေခြင်း (Error #11 ကို ဖြေရှင်းရန်)
          # ပုံသေ 29.0.3 မဟုတ်ဘဲ စက်ထဲရှိသမျှ အမြင့်ဆုံး version ကို ယူပါမည်
          BUILD_TOOLS_PATH=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          echo "Using Build Tools from: $BUILD_TOOLS_PATH"
          
          # ၃။ Gradle က ထုတ်ပေးလိုက်သော မူရင်း APK ကို ရှာဖွေခြင်း
          ORIGINAL_APK=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          
          # ၄။ Zipalign ပြုလုပ်ခြင်း (App ပိုမိုမြန်ဆန်ပြီး Install အဆင်ပြေစေရန်)
          $BUILD_TOOLS_PATH/zipalign -v 4 "$ORIGINAL_APK" KEEC13-ubt5-app.apk
          
          # ၅။ apksigner ဖြင့် လက်မှတ်ထိုးခြင်း (V1, V2, V3 Schemes အားလုံးပါဝင်စေရန်)
          # Sketchware Keystore ဖြစ်ပါက အောက်ပါ command သည် အသင့်တော်ဆုံး ဖြစ်ပါသည်
          $BUILD_TOOLS_PATH/apksigner sign --ks release.jks \
            --ks-pass pass:"$KEYSTORE_PASSWORD" \
            --ks-key-alias "$KEY_ALIAS" \
            --key-pass pass:"$KEYSTORE_PASSWORD" \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            KEEC13-ubt5-app.apk
          
          echo "✅ Official Signed APK Created: KEEC13-ubt5-app.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KEEC13-ubt5-Final-APK
          path: KEEC13-ubt5-app.apk
