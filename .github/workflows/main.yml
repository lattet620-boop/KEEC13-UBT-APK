name: HTML to APK (SDK 21 - Original Stable)
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Prepare Folder and Install Tools
        run: |
          npm install -g @ionic/cli @capacitor/assets
          npm install @capacitor/core @capacitor/cli @capacitor/android
          mkdir -p assets www
          cp icon.png assets/icon.png || echo "icon.png not found"
          cp splash.png assets/splash.png || echo "splash.png not found"
          cp -r ./* www/ || true
          rm -rf www/.github www/assets www/www || true

      - name: Initialize and Build Android
        run: |
          # index.html အသစ်များ အမြဲတမ်း APK ထဲ တန်းရောက်စေရန် Folder ဟောင်းကို ကြိုတင်ဖျက်ခြင်း
          rm -rf android
          
          npx cap init ubt5 com.ubt5.app --web-dir www
          npx cap add android
          npx capacitor-assets generate --android --assetPath assets

          # Webview နှင့် Network Security ပြင်ဆင်ခြင်း
          sed -i 's/android:usesCleartextTraffic="false"/android:usesCleartextTraffic="true"/' android/app/src/main/AndroidManifest.xml
          
          echo '{"appId": "com.ubt5.app", "appName": "ubt5", "webDir": "www", "server": {"allowNavigation": ["*"], "cleartext": true}}' > capacitor.config.json

          export JAVA_HOME=$JAVA_HOME_21_X64
          npx cap sync android
          
          # Release Version အဖြစ် တည်ဆောက်ခြင်း
          cd android && ./gradlew assembleRelease

      # အလိုအလျောက် Zipalign နှင့် apksigner ဗားရှင်းသစ်များကို အမှားကင်းစွာ လုပ်ဆောင်ပေးမည့် စနစ်
      - name: Sign Android APK
        uses: ilcifer/sign-android-release@v1
        id: sign_app
        with:
          releaseDir: android/app/build/outputs/apk/release
          signingKey: ${{ secrets.KEYSTORE_BASE64 }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyPassword: ${{ secrets.KEYSTORE_PASSWORD }}

      # ဒေါင်းလုဒ်ဆွဲမည့် ဖိုင်နာမည်ကို ဆရာ့စိတ်ကြိုက် ပြန်ပြောင်းလဲပေးခြင်း
      - name: Rename Signed APK
        run: |
          mv ${{ steps.sign_app.outputs.signedFile }} KEEC13-ubt5-app.apk
          echo "✅ Official Signed APK Created and Renamed Successfully!"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KEEC13-ubt5-Official-APK
          path: KEEC13-ubt5-app.apk
