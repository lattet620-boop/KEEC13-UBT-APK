name: HTML to APK (SDK 21 - Original Stable)
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Prepare Folder and Install Tools
        run: |
          npm install -g @ionic/cli @capacitor/assets
          npm install @capacitor/core @capacitor/cli @capacitor/android
          mkdir -p assets www
          cp icon.png assets/icon.png || echo "icon.png not found"
          cp splash.png assets/splash.png || echo "splash.png not found"
          cp -r ./* www/ || true
          rm -rf www/.github www/assets www/www || true

      - name: Initialize and Build Android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          # ၁။ ယခင် Android Folder ဟောင်းကို လုံးဝအမြစ်ပြတ်ဖျက်ခြင်း
          rm -rf android
          
          # ၂။ Capacitor စနစ်စတင်ခြင်း
          npx cap init ubt5 com.ubt5.app --web-dir www
          npx cap add android
          npx capacitor-assets generate --android --assetPath assets

          # ၃။ Cleartext Traffic ခွင့်ပြုခြင်း
          sed -i 's/android:usesCleartextTraffic="false"/android:usesCleartextTraffic="true"/' android/app/src/main/AndroidManifest.xml
          echo '{"appId": "com.ubt5.app", "appName": "ubt5", "webDir": "www", "server": {"allowNavigation": ["*"], "cleartext": true}}' > capacitor.config.json

          export JAVA_HOME=$JAVA_HOME_21_X64
          npx cap sync android
          
          # ၄။ GitHub Secrets ထဲမှ Keystore ဖိုင်ကို ဆောက်ယူခြင်း
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.jks

          # ၅။ Android Gradle ထဲသို့ Keystore စကားဝှက်များကို Native အတိုင်း တိုက်ရိုက်ထည့်သွင်းခြင်း
          # ဤနည်းလမ်းသည် command ရိုက်ရန်မလိုဘဲ အလိုအလျောက် Signed APK ထွက်စေသည်
          cat <<EOF >> android/app/build.gradle

          android {
              signingConfigs {
                  release {
                      storeFile file("release.jks")
                      storePassword "$KEYSTORE_PASSWORD"
                      keyAlias "$KEY_ALIAS"
                      keyPassword "$KEYSTORE_PASSWORD"
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          EOF

          # ၆။ တရားဝင် လက်မှတ်ထိုးပြီးသား Official Signed APK ကို တစ်ခါတည်း ဆောက်ယူခြင်း
          cd android && ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KEEC13-ubt5-Official-APK
          path: android/app/build/outputs/apk/release/app-release.apk
